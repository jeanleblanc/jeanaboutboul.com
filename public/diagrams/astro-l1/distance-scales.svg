<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="420" viewBox="0 0 1100 420" role="img" aria-labelledby="title desc">
  <title id="title">Échelles de distance</title>
  <desc id="desc">Comparaison UA, année-lumière et parsec.</desc>
  <defs>
    <style>
      .title { font: 700 20px 'Helvetica Neue', Arial, sans-serif; fill: #1f2937; }
      .label { font: 600 15px 'Helvetica Neue', Arial, sans-serif; fill: #111827; }
      .small { font: 500 13px 'Helvetica Neue', Arial, sans-serif; fill: #4b5563; }
      .axis { stroke: #64748b; stroke-width: 2; }
      .tick { stroke: #94a3b8; stroke-width: 1.6; }
      .ua { fill: #eef5ff; stroke: #5e81ac; stroke-width: 1.8; }
      .al { fill: #f0fdf4; stroke: #7aa05f; stroke-width: 1.8; }
      .pc { fill: #fff7ed; stroke: #d08770; stroke-width: 1.8; }
    </style>
  </defs>
  <rect width="1100" height="420" fill="#fff"/>
  <text x="34" y="42" class="title">Échelles de distance en astrophysique</text>

  <line x1="120" y1="220" x2="980" y2="220" class="axis"/>
  <line x1="120" y1="205" x2="120" y2="235" class="tick"/>
  <line x1="430" y1="205" x2="430" y2="235" class="tick"/>
  <line x1="710" y1="205" x2="710" y2="235" class="tick"/>
  <line x1="980" y1="205" x2="980" y2="235" class="tick"/>

  <rect x="150" y="90" width="240" height="80" rx="10" class="ua"/>
  <text x="270" y="122" text-anchor="middle" class="label">1 UA</text>
  <text x="270" y="145" text-anchor="middle" class="small">~ 1.496 x 10^11 m</text>

  <rect x="470" y="90" width="240" height="80" rx="10" class="al"/>
  <text x="590" y="122" text-anchor="middle" class="label">1 année-lumière</text>
  <text x="590" y="145" text-anchor="middle" class="small">~ 9.461 x 10^15 m</text>

  <rect x="760" y="90" width="240" height="80" rx="10" class="pc"/>
  <text x="880" y="122" text-anchor="middle" class="label">1 parsec</text>
  <text x="880" y="145" text-anchor="middle" class="small">~ 3.26 al</text>
  <text x="880" y="162" text-anchor="middle" class="small">~ 3.086 x 10^16 m</text>

  <text x="120" y="275" class="small">Système solaire</text>
  <text x="430" y="275" text-anchor="middle" class="small">échelle interstellaire</text>
  <text x="710" y="275" text-anchor="middle" class="small">astrophysique observationnelle</text>
  <text x="980" y="275" text-anchor="end" class="small">distance cosmique locale</text>

  <text x="120" y="335" class="small">Parallaxe: d(pc) = 1 / p(arcsec)</text>
</svg>
