<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="560" viewBox="0 0 1080 560" role="img" aria-labelledby="title desc">
  <title id="title">System Semantics</title>
  <desc id="desc">Flow of system declaration and solve behavior.</desc>
  <defs>
    <style>
      .title { font: 700 20px 'Helvetica Neue', Arial, sans-serif; fill: #1f2937; }
      .label { font: 600 15px 'Helvetica Neue', Arial, sans-serif; fill: #111827; }
      .small { font: 500 13px 'Helvetica Neue', Arial, sans-serif; fill: #374151; }
      .node { fill: #f8fafc; stroke: #93a4b8; stroke-width: 1.6; rx: 10; }
      .decision { fill: #fff7ed; stroke: #d08770; stroke-width: 1.8; }
      .ok { fill: #f0fdf4; stroke: #7aa05f; stroke-width: 1.8; }
      .err { fill: #fef2f2; stroke: #bf616a; stroke-width: 1.8; }
      .link { stroke: #6b7f99; stroke-width: 1.7; fill: none; marker-end: url(#arrow); }
      .yesno { font: 600 13px 'Helvetica Neue', Arial, sans-serif; fill: #374151; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#6b7f99"/>
    </marker>
  </defs>

  <rect width="1080" height="560" fill="#ffffff"/>
  <text x="34" y="42" class="title">System Semantics in v0.1</text>

  <rect x="360" y="74" width="360" height="58" class="node"/>
  <text x="540" y="108" text-anchor="middle" class="label">system s : z, y (equation block)</text>

  <rect x="350" y="168" width="380" height="56" class="node"/>
  <text x="540" y="201" text-anchor="middle" class="label">Declare symbolic unknowns and store equations</text>

  <rect x="430" y="258" width="220" height="54" class="node"/>
  <text x="540" y="291" text-anchor="middle" class="label">evaluate(s)</text>

  <polygon points="540,338 710,410 540,482 370,410" class="decision"/>
  <text x="540" y="415" text-anchor="middle" class="label">Solvable in supported scope?</text>

  <rect x="110" y="378" width="220" height="64" class="err"/>
  <text x="220" y="407" text-anchor="middle" class="label">Runtime solving error</text>
  <text x="220" y="426" text-anchor="middle" class="small">no values exported</text>

  <rect x="750" y="378" width="250" height="78" class="ok"/>
  <text x="875" y="407" text-anchor="middle" class="label">Assign values + infer types</text>
  <text x="875" y="428" text-anchor="middle" class="small">z and y become available outside</text>

  <path d="M540,132 L540,168" class="link"/>
  <path d="M540,224 L540,258" class="link"/>
  <path d="M540,312 L540,337" class="link"/>
  <path d="M371,410 L330,410" class="link"/>
  <path d="M710,410 L750,410" class="link"/>

  <text x="346" y="397" class="yesno">No</text>
  <text x="718" y="397" class="yesno">Yes</text>
</svg>
