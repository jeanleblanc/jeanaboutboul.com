<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">J Language Overview</title>
  <desc id="desc">Core characteristics and goals of J Language.</desc>
  <defs>
    <style>
      .title { font: 700 20px 'Helvetica Neue', Arial, sans-serif; fill: #1f2937; }
      .label { font: 600 15px 'Helvetica Neue', Arial, sans-serif; fill: #111827; }
      .small { font: 500 13px 'Helvetica Neue', Arial, sans-serif; fill: #374151; }
      .node { fill: #f8fafc; stroke: #93a4b8; stroke-width: 1.6; rx: 10; }
      .main { fill: #e8f0fb; stroke: #5e81ac; stroke-width: 2; }
      .link { stroke: #6b7f99; stroke-width: 1.6; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#6b7f99"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1200" height="620" fill="#ffffff"/>
  <text x="40" y="42" class="title">J Language - Overview</text>

  <rect x="490" y="70" width="220" height="58" class="node main"/>
  <text x="600" y="106" text-anchor="middle" class="label">J Language</text>

  <rect x="70" y="190" width="190" height="54" class="node"/>
  <text x="165" y="223" text-anchor="middle" class="label">Imperative</text>

  <rect x="290" y="190" width="190" height="54" class="node"/>
  <text x="385" y="223" text-anchor="middle" class="label">Procedural</text>

  <rect x="510" y="190" width="190" height="54" class="node"/>
  <text x="605" y="223" text-anchor="middle" class="label">Math-oriented</text>

  <rect x="730" y="190" width="190" height="54" class="node"/>
  <text x="825" y="223" text-anchor="middle" class="label">LaTeX-inspired syntax</text>

  <rect x="950" y="190" width="190" height="54" class="node"/>
  <text x="1045" y="223" text-anchor="middle" class="label">Calculator role</text>

  <path d="M600,128 L165,190" class="link"/>
  <path d="M600,128 L385,190" class="link"/>
  <path d="M600,128 L605,190" class="link"/>
  <path d="M600,128 L825,190" class="link"/>
  <path d="M600,128 L1045,190" class="link"/>

  <rect x="80" y="320" width="170" height="46" class="node"/>
  <text x="165" y="349" text-anchor="middle" class="small">Top-to-bottom execution</text>

  <rect x="300" y="320" width="170" height="46" class="node"/>
  <text x="385" y="349" text-anchor="middle" class="small">Built-in operations</text>

  <rect x="500" y="300" width="210" height="46" class="node"/>
  <text x="605" y="329" text-anchor="middle" class="small">Typed mathematical values</text>

  <rect x="500" y="358" width="210" height="46" class="node"/>
  <text x="605" y="387" text-anchor="middle" class="small">Equations and systems</text>

  <rect x="735" y="320" width="180" height="46" class="node"/>
  <text x="825" y="349" text-anchor="middle" class="small">frac, times, pi, e, i</text>

  <rect x="945" y="290" width="200" height="46" class="node"/>
  <text x="1045" y="319" text-anchor="middle" class="small">Numeric computation</text>

  <rect x="945" y="348" width="200" height="46" class="node"/>
  <text x="1045" y="377" text-anchor="middle" class="small">Symbolic unknowns</text>

  <rect x="945" y="406" width="200" height="46" class="node"/>
  <text x="1045" y="435" text-anchor="middle" class="small">Equation solving</text>

  <path d="M165,244 L165,320" class="link"/>
  <path d="M385,244 L385,320" class="link"/>
  <path d="M605,244 L605,300" class="link"/>
  <path d="M605,244 L605,358" class="link"/>
  <path d="M825,244 L825,320" class="link"/>
  <path d="M1045,244 L1045,290" class="link"/>
  <path d="M1045,244 L1045,348" class="link"/>
  <path d="M1045,244 L1045,406" class="link"/>
</svg>
